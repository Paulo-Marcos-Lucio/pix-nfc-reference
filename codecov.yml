coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: true

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: true

ignore:
  - "**/DictClientApplication.java"
  - "**/dto/**"
  - "**/config/**"
  - "**/simulator/**"
  - "src/test/**"
