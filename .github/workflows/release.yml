name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (ex: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ inputs.tag }}"
          else
            REF="${{ github.ref_name }}"
          fi
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set Maven version
        run: ./mvnw -B -ntp versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Package
        run: ./mvnw -B -ntp package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: jar
          path: target/*.jar
          retention-days: 30

  image:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set Maven version
        run: ./mvnw -B -ntp versions:set -DnewVersion=${{ needs.build.outputs.version }} -DgenerateBackupPoms=false

      - name: Resolve lowercase image repo
        run: echo "IMAGE_REPO=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image
        run: |
          ./mvnw -B -ntp spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ needs.build.outputs.version }}

      - name: Tag latest
        run: |
          docker tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ needs.build.outputs.version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ needs.build.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest

      - name: Trivy scan (released image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ needs.build.outputs.version }}
          format: sarif
          output: trivy-release.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-release.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-release.sarif
          category: trivy-release
        continue-on-error: true

      - name: Generate SBOM (CycloneDX)
        run: ./mvnw -B -ntp org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -DskipTests || true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: target/bom.*
          retention-days: 90
          if-no-files-found: ignore

      - name: Capture pushed image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ needs.build.outputs.version }} \
            | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: false
        continue-on-error: true

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, image]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download JAR
        uses: actions/download-artifact@v8
        with:
          name: jar
          path: artifacts/

      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: artifacts/
        continue-on-error: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: artifacts/*
