name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: temurin
  MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn -Dmaven.wagon.http.retryHandler.count=3"
  MVN: ./mvnw -B -ntp

jobs:
  build:
    name: Compile & validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate POM
        run: $MVN validate

      - name: Compile (main + tests)
        run: $MVN test-compile

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        run: $MVN test -Dsurefire.useFile=false -Dsurefire.printSummary=true

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit tests
          path: "**/target/surefire-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"
          retention-days: 7

  integration-tests:
    name: Integration tests (client vs simulator)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run integration tests
        run: $MVN verify -Dsurefire.useFile=false -Dfailsafe.useFile=false

      - name: Publish IT report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Integration tests
          path: "**/target/failsafe-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: target/site/jacoco/jacoco.xml
          flags: integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  arch-tests:
    name: Architecture tests (ArchUnit)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run ArchUnit tests
        run: $MVN test -Dtest='*Architecture*'

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Semgrep scan
        run: |
          semgrep ci \
            --config p/java \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif --output=semgrep.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build OCI image
        run: ./mvnw -B -ntp spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=pix-nfc-reference:ci

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pix-nfc-reference:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, arch-tests, semgrep, docker]
    if: always()
    steps:
      - name: Aggregate status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
