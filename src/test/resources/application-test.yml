spring:
  threads:
    virtual:
      enabled: true

server:
  port: 0

management:
  tracing:
    sampling:
      probability: 0.0

pixnfc:
  merchant:
    ispb: "12345678"
    pix-key: "12345678000199"
    display-name: "Padaria de Teste"
  crypto:
    hmac-key: "test-hmac-key-minimum-32-bytes-for-tests-1234"
    hmac-algorithm: "HmacSHA256"
  dict:
    endpoint:
      base-url: "http://placeholder/dict/v1"
      connect-timeout: 2s
      read-timeout: 5s
    cache:
      max-size: 100
      ttl:
        cpf: 30s
        cnpj: 60s
        email: 60s
        phone: 60s
        evp: 30s
  spi:
    endpoint:
      base-url: "http://placeholder/spi/v1"
      connect-timeout: 2s
      read-timeout: 5s
  mtls:
    enabled: false
    bundle-name: ""
  simulator:
    enabled: true
    failure-rate: 0.0
    latency-jitter: 0ms
    store-capacity: 100

resilience4j:
  retry:
    instances:
      dict-lookup:
        max-attempts: 1
      spi-pay:
        max-attempts: 1

logging:
  level:
    dev.pmlsp.pixnfc: DEBUG
